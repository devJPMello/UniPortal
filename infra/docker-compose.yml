services:
  postgres:
    image: postgres:16-alpine
    container_name: uniportal-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: uniportal
      POSTGRES_PASSWORD: uniportal
      POSTGRES_DB: uniportal
    volumes:
      - uniportal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniportal -d uniportal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  uniportal_pgdata:
