<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro — Sistema da Mantenedora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-sans: 'Inter', -apple-system, sans-serif;
      --color-primary: #1B3A6B;
      --color-bg: #F0F4F8;
      --color-surface: #FFFFFF;
      --color-surface-alt: #F7F9FC;
      --color-border: #E2E8F0;
      --color-text: #1A202C;
      --color-text-secondary: #718096;
      --color-text-muted: #A0AEC0;
      --color-success: #38A169;
      --color-success-bg: #F0FFF4;
      --color-warning: #D69E2E;
      --color-warning-bg: #FFFFF0;
      --color-error: #E53E3E;
      --color-error-bg: #FFF5F5;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.1);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--color-bg); color: var(--color-text); font-size: 14px; line-height: 1.5; padding: 24px; }

    .fin-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
    .fin-header-left {}
    .fin-title { font-size: 18px; font-weight: 700; color: var(--color-primary); }
    .fin-subtitle { font-size: 12px; color: var(--color-text-muted); margin-top: 2px; }
    .fin-user { font-size: 13px; color: var(--color-text-secondary); margin-top: 6px; }

    .fin-summary {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .fin-sum-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: 10px; padding: 14px 18px; text-align: center; min-width: 130px;
      box-shadow: var(--shadow-sm);
    }
    .fin-sum-val { display: block; font-size: 20px; font-weight: 700; }
    .fin-sum-lbl { display: block; font-size: 11px; color: var(--color-text-secondary); margin-top: 3px; }

    .fin-section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; margin-top: 24px; }

    .fin-boleto {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: 10px; padding: 16px 20px; margin-bottom: 10px;
      box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 16px;
    }
    .fin-boleto-info { flex: 1; }
    .fin-boleto-mes  { font-weight: 700; font-size: 15px; }
    .fin-boleto-venc { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
    .fin-boleto-valor { font-size: 17px; font-weight: 700; min-width: 100px; text-align: right; }
    .fin-badge {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 999px; min-width: 76px; text-align: center;
    }
    .badge-pago    { color: var(--color-success); background: var(--color-success-bg); }
    .badge-pendente{ color: var(--color-warning); background: var(--color-warning-bg); }
    .badge-vencido { color: var(--color-error);   background: var(--color-error-bg);   }

    .fin-actions { display: flex; gap: 8px; align-items: center; }
    .fin-btn {
      height: 34px; border: 1px solid var(--color-border); background: none;
      border-radius: 7px; padding: 0 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; color: var(--color-primary);
      transition: all .15s;
    }
    .fin-btn:hover { background: var(--color-primary); color: white; border-color: var(--color-primary); }
    .fin-btn-pagar {
      background: var(--color-primary); color: white; border: none;
    }
    .fin-btn-pagar:hover { opacity: .85; }

    .fin-codigo {
      font-size: 10px; font-family: monospace; color: var(--color-text-muted);
      margin-top: 6px; background: var(--color-surface-alt); padding: 4px 8px;
      border-radius: 5px; display: block; user-select: all; cursor: text;
    }

    .fin-toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--color-success); color: white;
      padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
      box-shadow: var(--shadow-md); display: none; z-index: 100;
    }
    .fin-toast.show { display: block; }
  </style>
</head>
<body>
  <div class="fin-header">
    <div class="fin-header-left">
      <div class="fin-title">💳 Portal Financeiro</div>
      <div class="fin-subtitle">Sistema da Mantenedora — integrado via iframe</div>
      <div class="fin-user" id="fin-user">Carregando usuário...</div>
    </div>
    <div class="fin-summary" id="fin-summary"></div>
  </div>

  <div class="fin-section-title">Mensalidades 2026</div>
  <div id="fin-boletos"></div>

  <div class="fin-toast" id="fin-toast">✓ Código de barras copiado!</div>

  <script src="/src/main.js" type="module"></script>
</body>
</html>
